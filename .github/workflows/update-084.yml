name: 同步本地化文本更新

on:
  schedule:
    # 每天UTC时间0点执行（北京时间8点）
    - cron: '0 0 * * *'
  workflow_dispatch:  # 允许手动触发

jobs:
  sync-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0  # 获取完整历史
        
    - name: Get latest release info
      id: get_release
      run: |
        # 获取最新release信息
        RELEASE_INFO=$(curl -s https://api.github.com/repos/ghcruise/LimbusCompany-IOS-Localization/releases/latest)
        LATEST_VERSION=$(echo "$RELEASE_INFO" | jq -r '.tag_name')
        CURRENT_VERSION=$(cat .version || echo "none")
        
        echo "Latest version: $LATEST_VERSION"
        echo "Current version: $CURRENT_VERSION"
        
        if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
          echo "New version detected!"
          echo "new_version=true" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          # 获取localize_jp.zip的下载URL
          DOWNLOAD_URL=$(echo "$RELEASE_INFO" | jq -r '.assets[] | select(.name=="localize_jp.zip") | .browser_download_url')
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
        else
          echo "No new version"
          echo "new_version=false" >> $GITHUB_OUTPUT
        fi
        
    - name: Download and process files
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        # 创建临时目录
        mkdir -p temp_download
        mkdir -p temp_extract
        
        # 下载压缩包
        cd temp_download
        wget -O localize_jp.zip "${{ steps.get_release.outputs.download_url }}"
        
        # 解压文件
        unzip localize_jp.zip -d ../temp_extract/
        cd ..
        
        # 处理文件：重命名JP_前缀为EN_
        cd temp_extract
        
        # 如果存在LocalizeTemp_jp文件夹
        if [ -d "LocalizeTemp_jp" ]; then
          cd LocalizeTemp_jp
        fi
        
        # 递归重命名所有以JP_开头的文件
        find . -type f -name "JP_*" | while read file; do
          dir=$(dirname "$file")
          basename=$(basename "$file")
          newname="${basename/#JP_/EN_}"
          mv "$file" "$dir/$newname"
          echo "Renamed: $basename -> $newname"
        done
        
        cd ../..
        
        # 准备目标目录
        TARGET_DIR="Android/data/com.ProjectMoon.LimbusCompany/files/Assets/Resources_moved/Localize/en"
        mkdir -p "$TARGET_DIR"
        
        # 复制所有文件到目标目录（保持目录结构）
        if [ -d "temp_extract/LocalizeTemp_jp" ]; then
          cp -r temp_extract/LocalizeTemp_jp/* "$TARGET_DIR/"
        else
          cp -r temp_extract/* "$TARGET_DIR/"
        fi
        
        # 保存新版本号
        echo "${{ steps.get_release.outputs.version }}" > .version
        
        echo "Files processed and copied to target directory"
        
        # 清理临时文件（可选）
        rm -rf temp_download temp_extract
        
    - name: Commit and push changes
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 只添加目标目录和版本文件
        git add Android/
        git add .version
        
        # 检查是否有变更需要提交
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        # 提交变更
        git commit -m "同步更新版本 ${{ steps.get_release.outputs.version }}"
        
        # 推送到main分支
        git push origin main
        
    - name: Create release package
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        # 进入工作区根目录
        cd ${{ github.workspace }}
    
        # 压缩完整的文件夹路径
        zip -r localize.zip Android/data/com.ProjectMoon.LimbusCompany/files/Assets/Resources_moved/Localize/en/
    
        echo "Package created: localize.zip"
        echo "Package size: $(ls -lh localize.zip | awk '{print $5}')"
    
        # 查看压缩包内容（调试用）
        echo "Contents of localize.zip:"
        unzip -l localize.zip | head -20
        
    - name: Create release
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        VERSION="${{ steps.get_release.outputs.version }}"
        RELEASE_NAME="$VERSION"
        
        # 创建release并上传压缩包
        gh release create "$VERSION" \
          --title "$RELEASE_NAME" \
          --notes "更新到版本 $VERSION" \
          --target main \
          localize.zip
        
        echo "Release $VERSION created with localize.zip"
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}