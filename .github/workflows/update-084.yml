name: 同步本地化文本更新

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  sync-release:
    runs-on: ubuntu-latest
    
    steps:
    - name: 检查仓库
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        fetch-depth: 0
        
    - name: 获取原iOS版汉化项目信息
      id: get_release
      run: |
        # 使用认证请求
        RESPONSE=$(curl -s \
          -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
          -H "Accept: application/vnd.github.v3+json" \
          https://api.github.com/repos/ghcruise/LimbusCompany-IOS-Localization/releases/latest)
        
        # 调试：打印响应（可选）
        echo "API Response:"
        echo "$RESPONSE" | jq '.' 2>/dev/null || echo "Failed to parse JSON"
        
        # 检查是否为空或错误
        if [ -z "$RESPONSE" ] || [ "$RESPONSE" == "null" ]; then
          echo "No response or null response"
          echo "new_version=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # 检查是否有错误信息
        ERROR_MSG=$(echo "$RESPONSE" | jq -r '.message' 2>/dev/null)
        if [ "$ERROR_MSG" != "null" ] && [ -n "$ERROR_MSG" ]; then
          echo "API Error: $ERROR_MSG"
          echo "new_version=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # 获取版本号
        LATEST_VERSION=$(echo "$RESPONSE" | jq -r '.tag_name' 2>/dev/null)
        
        if [ -z "$LATEST_VERSION" ] || [ "$LATEST_VERSION" == "null" ]; then
          echo "No version found in response"
          echo "new_version=false" >> $GITHUB_OUTPUT
          exit 0
        fi
        
        # 读取当前版本
        if [ -f ".version" ]; then
          CURRENT_VERSION=$(cat .version)
        else
          CURRENT_VERSION="none"
        fi
        
        echo "Latest version: $LATEST_VERSION"
        echo "Current version: $CURRENT_VERSION"
        
        if [ "$LATEST_VERSION" != "$CURRENT_VERSION" ]; then
          echo "New version detected!"
          echo "new_version=true" >> $GITHUB_OUTPUT
          echo "version=$LATEST_VERSION" >> $GITHUB_OUTPUT
          
          # 获取下载URL
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.assets[] | select(.name=="localize_jp.zip") | .browser_download_url')
          
          if [ -z "$DOWNLOAD_URL" ] || [ "$DOWNLOAD_URL" == "null" ]; then
            echo "Warning: localize_jp.zip not found"
            echo "new_version=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          
          echo "download_url=$DOWNLOAD_URL" >> $GITHUB_OUTPUT
        else
          echo "No new version"
          echo "new_version=false" >> $GITHUB_OUTPUT
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        
    - name: 下载并处理文本文件
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        echo "Downloading from: ${{ steps.get_release.outputs.download_url }}"
        
        # 创建临时目录
        mkdir -p temp_download
        mkdir -p temp_extract
        
        # 下载压缩包
        cd temp_download
        wget -O localize_jp.zip "${{ steps.get_release.outputs.download_url }}"
        
        # 检查下载是否成功
        if [ ! -f "localize_jp.zip" ] || [ ! -s "localize_jp.zip" ]; then
          echo "Download failed or file empty"
          exit 1
        fi
        
        # 解压文件
        unzip localize_jp.zip -d ../temp_extract/
        cd ..
        
        # 处理文件
        cd temp_extract
        
        if [ -d "LocalizeTemp_jp" ]; then
          cd LocalizeTemp_jp
        fi
        
        cd ../..
        
        # 准备目标目录
        TARGET_DIR="Android/data/com.ProjectMoon.LimbusCompany/files/Assets/Resources_moved/Localize/jp"
        
        # 清空并创建目标目录（完全同步）
        rm -rf "$TARGET_DIR"
        mkdir -p "$TARGET_DIR"
        
        # 复制所有文件
        if [ -d "temp_extract/LocalizeTemp_jp" ]; then
          cp -r temp_extract/LocalizeTemp_jp/* "$TARGET_DIR/"
        else
          cp -r temp_extract/* "$TARGET_DIR/"
        fi
        
        # 保存新版本号
        echo "${{ steps.get_release.outputs.version }}" > .version
        
        # 清理临时文件
        rm -rf temp_download temp_extract
        
        echo "Files processed and copied to target directory"
        
    - name: 提交并推送更改
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        
        # 只添加目标目录和版本文件
        git add Android/
        git add .version
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
          exit 0
        fi
        
        git commit -m "同步更新版本 ${{ steps.get_release.outputs.version }}"
        git push origin main
        
    - name: 创建Release中的文本压缩包
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        cd ${{ github.workspace }}
        zip -r localize.zip Android/data/com.ProjectMoon.LimbusCompany/files/Assets/Resources_moved/Localize/jp/
        echo "Package created: localize.zip"
        
    - name: 创建Release 完成更新
      if: steps.get_release.outputs.new_version == 'true'
      run: |
        VERSION="${{ steps.get_release.outputs.version }}"
        gh release create "$VERSION" \
          --title "$VERSION" \
          --notes "更新到版本 $VERSION" \
          --target main \
          localize.zip
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}